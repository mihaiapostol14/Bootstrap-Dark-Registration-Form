<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Your Account</title>
</head>
<body>

  <main class="container">
    <h1 class="text-center">Registration</h1>

    <form class="needs-validation" id="registrationForm" action="#" method="POST" novalidate>

      <div class="form-group">
        <label class="form-label" for="first_name">First name</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter first name"
          name="first_name"
          id="first_name"
          required
          aria-describedby="firstNameError"
        >
        <div id="firstNameError" class="invalid-feedback" aria-live="polite">
          Please enter your first name.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="last_name">Last name</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter last name"
          name="last_name"
          id="last_name"
          required
          aria-describedby="lastNameError"
        >
        <div id="lastNameError" class="invalid-feedback" aria-live="polite">
          Please enter your last name.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email_address">Email Address</label>
        <input
          type="email"
          class="form-control"
          placeholder="Enter email address"
          name="email_address"
          id="email_address"
          required
          aria-describedby="emailError"
        >
        <div id="emailError" class="invalid-feedback" aria-live="polite">
          Please enter a valid email address.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="Enter password"
          name="password"
          id="password"
          minlength="8"
          required
          aria-describedby="passwordError"
        >
        <div id="passwordError" class="invalid-feedback" aria-live="polite">
          Password must be at least 8 characters long.
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="submitBtn">
        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
        <span class="btn-text">Register Account</span>
      </button>

    </form>
  </main>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/script.js"></script>
</body>
</html>
